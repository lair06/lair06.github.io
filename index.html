<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的個人網站 | My One-Page Portfolio</title>
    <style>
        /* 基礎全域設定與平滑滾動 */
        html {
            scroll-behavior: smooth; /* 關鍵：實現點擊選單平滑滾動 */
        }
        body {
            font-family: 'Helvetica Neue', Arial, "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif;
            margin: 0;
            padding: 0;
            color: #333;
            background-color: #f9f9f9;
            line-height: 1.6;
        }

        /* 導覽列（固定在最上方） */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: rgba(255, 255, 255, 0.95);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 1000;
        }
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1100px;
            margin: 0 auto;
            padding: 15px 20px;
        }
        .logo {
            font-weight: bold;
            font-size: 1.2rem;
            color: #2c3e50;
        }
        .nav-links {
            list-style: none;
            display: flex;
            margin: 0;
            padding: 0;
        }
        .nav-links li {
            margin-left: 20px;
        }
        .nav-links a {
            text-decoration: none;
            color: #555;
            font-weight: 500;
            transition: color 0.3s;
        }
        .nav-links a:hover {
            color: #3498db;
        }

        /* 每個區塊（Section）的基本樣式 */
        section {
            padding: 100px 20px 80px 20px; /* 留出 header 的高度 */
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #2c3e50;
            position: relative;
        }
        h2::after {
            content: '';
            display: block;
            width: 50px;
            height: 3px;
            background-color: #3498db;
            margin: 10px auto 0 auto;
        }

        /* 各區塊專屬背景色 */
        #home {
            background: linear-gradient(135deg, #74b9ff, #a29bfe);
            color: white;
            min-height: 100vh;
        }
        #home h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
        }
        #home p {
            font-size: 1.5rem;
            margin-bottom: 30px;
            opacity: 0.9;
        }
        .btn {
            display: inline-block;
            background-color: white;
            color: #6c5ce7;
            padding: 12px 30px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.2);
        }

        #about {
            background-color: #ffffff;
        }
        
        #portfolio {
            background-color: #f1f2f6;
        }
        /* 簡單的作品集卡片網格 */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 40px;
            width: 100%;
            max-width: 1000px;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        #contact {
            background-color: #ffffff;
        }

        /* 頁尾 */
        footer {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 0.9rem;
        }/* 左輪容器設定 */
.carousel-stage { 
    perspective: 1000px; 
    height: 400px; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    margin-top: 50px;
}
.carousel-container { 
    width: 250px; 
    height: 300px; 
    position: relative; 
    transform-style: preserve-3d; 
    transition: transform 0.5s; 
    cursor: grab; 
}
.carousel-item { 
    position: absolute; 
    width: 100%; 
    height: 100%; 
    transition: transform 0.5s; 
}
.carousel-item img { 
    width: 100%; 
    height: 100%; 
    object-fit: cover; 
    border-radius: 10px; 
    box-shadow: 0 10px 20px rgba(0,0,0,0.3); 
}

/* 放大效果 */
.carousel-item.active { transform: scale(1.3); z-index: 10; }
        /* 左輪容器設定 */
.carousel-stage { 
    perspective: 1000px; 
    height: 400px; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    margin-top: 50px;
}
.carousel-container { 
    width: 250px; 
    height: 300px; 
    position: relative; 
    transform-style: preserve-3d; 
    transition: transform 0.5s; 
    cursor: grab; 
}
.carousel-item { 
    position: absolute; 
    width: 100%; 
    height: 100%; 
    transition: transform 0.5s; 
}
.carousel-item img { 
    width: 100%; 
    height: 100%; 
    object-fit: cover; 
    border-radius: 10px; 
    box-shadow: 0 10px 20px rgba(0,0,0,0.3); 
}

/* 放大效果 */
.carousel-item.active { transform: scale(1.3); z-index: 10; }
    </style>
</head>
<body>

    <!-- 導覽列 -->
    <header>
        <nav>
            <div class="logo">詹沅叡 Studio</div>
            <ul class="nav-links">
                <!-- 這裡的 href 指向下方 section 的 id -->
                <li><a href="#home">首頁</a></li>
                <li><a href="#about">關於我</a></li>
                <li><a href="#portfolio">精選作品</a></li>
                <li><a href="#contact">聯絡方式</a></li>
            </ul>
        </nav>
    </header>

    <!-- 區塊一：首頁 -->
    <section id="home">
        <div class="container">
            <h1>哈囉！我是 詹沅叡(小卷)</h1>
            <p>一名平面設計與影片創作的設計師</p>
            <a href="#portfolio" class="btn">查看我的作品</a>
        </div>
    </section>

    <!-- 區塊二：關於我 -->
    <section id="about">
        <div class="container">
            <h2>關於我</h2>
            <p>這裡可以填寫你的簡介、專長領域、使用工具，或是分享你的創作理念。用簡短有力的幾句話，讓造訪網站的人快速認識你。</p>
        </div>
    </section>

 
    <!-- 區塊三：作品集 -->
    <section id="portfolio">
        <div class="container">
            <h2>精選作品</h2>
            
            <!-- 左輪旋轉容器 -->
            <div class="carousel-stage">
                <div class="carousel-container" id="carousel">
                    <div class="carousel-item"><img src="images/FB/FB-01.jpg" alt="作品1"></div>
                    <div class="carousel-item"><img src="images/FB/FB-02.jpg" alt="作品2"></div>
                    <div class="carousel-item"><img src="images/FB/FB-03.jpg" alt="作品3"></div>
                </div>
            </div>
            
        </div>
    </section>

    <!-- 區塊四：聯絡方式 -->
    <section id="contact">
        <div class="container">
            <h2>聯絡方式</h2>
            <p>有任何合作機會或想聊聊的嗎？歡迎隨時與我聯絡！</p>
            <p>Email: <a href="mailto:your-email@example.com">your-email@example.com</a></p>
        </div>
    </section>

    <!-- 頁尾 -->
    <footer>
        <p>&copy; 2026 詹沅叡 Studio. All rights reserved.</p>
    </footer>
<script>
    const carousel = document.getElementById('carousel');
    const items = document.querySelectorAll('.carousel-item');
    let rotation = 0;

    // 將圖片排成圓形
    items.forEach((item, index) => {
        const angle = (360 / items.length) * index;
        item.style.transform = `rotateY(${angle}deg) translateZ(300px)`;
    });

    // 簡單的滑鼠拖曳旋轉
    let isDragging = false;
    let startX;
    
    carousel.onmousedown = (e) => { isDragging = true; startX = e.pageX; };
    window.onmouseup = () => isDragging = false;
    window.onmousemove = (e) => {
        if(isDragging) {
            const diff = (e.pageX - startX) * 0.5;
            rotation += diff;
            carousel.style.transform = `rotateY(${rotation}deg)`;
            startX = e.pageX;
        }
    };
</script>

</html>
