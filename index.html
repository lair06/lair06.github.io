<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>詹沅叡 Studio | 視覺設計師作品集</title>
    <!-- 引入 Google Fonts 英文現代俐落字型 -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* ==========================================
           1. 全域基礎設定
           ========================================== */
        body { 
            font-family: 'Montserrat', 'Helvetica Neue', Arial, "PingFang TC", sans-serif; 
            margin: 0; padding: 0; 
            color: #333; 
            background-color: #f7f8fa; 
            line-height: 1.6; 
        }

        /* ==========================================
           2. 頂部導覽列設定
           ========================================== */
        header { 
            position: fixed; top: 0; width: 100%; 
            background-color: rgba(255, 255, 255, 0.95); 
            box-shadow: 0 2px 15px rgba(0,0,0,0.04); 
            z-index: 1000; 
            backdrop-filter: blur(8px); 
        }
        nav { 
            display: flex; justify-content: space-between; align-items: center; 
            max-width: 1200px; margin: 0 auto; padding: 18px 30px; 
        }
        .logo { font-weight: 700; font-size: 1.2rem; color: #111; letter-spacing: 1px; cursor: pointer; }
        .nav-links { list-style: none; display: flex; margin: 0; padding: 0; }
        .nav-links li { margin-left: 35px; }
        .nav-links a { 
            text-decoration: none; color: #666; font-weight: 600; font-size: 0.95rem; 
            transition: color 0.3s; cursor: pointer;
        }
        .nav-links a:hover, .nav-links a.active-link { color: #3498db; }

        /* ==========================================
           3. 獨立頁面 (Page Views) 控制機制
           ========================================== */
        .page-view {
            display: none; /* 預設隱藏所有獨立頁面 */
            padding-top: 0px; /* 預留給頂部導覽列的高度 */
            min-height: calc(100vh - 80px);
            box-sizing: border-box;
        }
        .page-view.active-page {
            display: block; /* 僅顯示當前被選中的頁面 */
        }

        /* ==========================================
           4. 【首頁】mimi.png 滿版/半滿版大封面設定
           ========================================== */
        .hero-banner {
            position: relative;
            width: 100%;
            height: 100px; /* 【可調整】封面高度，現為整張螢幕滿版 */
            background-image: url('images/mimi/mimi.png'); /* 你的首頁封面圖檔路徑 */
            background-size: cover;       /* 確保圖片填滿封面 */
            background-position: center;  /* 置中對齊 */
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* 封面圖上的遮罩與文字內容 */
        .hero-overlay {
            background-color: rgba(0, 0, 0, 0.4); /* 【可調整】封面暗色遮罩透明度，讓文字更清晰 */
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .hero-title {
            font-size: 3.5rem;
            color: #ffffff;
            font-weight: 700;
            margin-bottom: 15px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .hero-subtitle {
            font-size: 1.3rem;
            color: #f0f0f0;
            margin-bottom: 30px;
        }
        .hero-btn {
            display: inline-block;
            background-color: #3498db;
            color: white;
            padding: 12px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.4);
        }
        .hero-btn:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
        }

        /* ==========================================
           5. 【關於我】獨立頁面
           ========================================== */
        .content-container {
            max-width: 800px;
            margin: 60px auto;
            padding: 0 20px;
            text-align: center;
        }
        .page-title {
            font-size: 2.5rem;
            color: #111;
            font-weight: 700;
            margin-bottom: 20px;
        }

        /* ==========================================
           6. 【精選作品】獨立頁面
           ========================================== */
        .portfolio-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            text-align: center;
        }
        .category-tabs {
            display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-bottom: 30px;
        }
        .tab-btn {
            background-color: #fff; border: 2px solid #e5e5e5; padding: 10px 24px;
            border-radius: 30px; font-size: 0.95rem; font-weight: 600; color: #666;
            cursor: pointer; transition: all 0.3s ease;
        }
        .tab-btn:hover { border-color: #3498db; color: #3498db; }
        .tab-btn.active-tab {
            background-color: #111; color: white; border-color: #111;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }

        .gallery-wrapper {
            position: relative; display: flex; align-items: center; width: 100%;
        }
        .gallery-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; width: 100%; padding: 10px;
        }
        .gallery-item {
            background: #fff; border-radius: 12px; overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05); transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer; position: relative;
        }
        .gallery-item:hover { transform: translateY(-8px); box-shadow: 0 12px 30px rgba(0,0,0,0.12); }
        .gallery-item img { width: 100%; height: 220px; object-fit: cover; display: block; }
        .gallery-item::after {
            content: "查看作品"; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(17, 17, 17, 0.4); color: white; font-weight: 600; font-size: 0.95rem;
            display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s ease;
        }
        .gallery-item:hover::after { opacity: 1; }

        .arrow-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 50px; height: 50px; background-color: white; border: 1px solid #eaeaea;
            border-radius: 50%; font-size: 1.2rem; color: #333; cursor: pointer;
            display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.08); z-index: 10;
        }
        .arrow-btn:hover { background-color: #111; color: white; border-color: #111; }
        .left-arrow { left: -30px; }
        .right-arrow { right: -30px; }
        .page-indicator { margin-top: 25px; font-size: 0.95rem; color: #888; font-weight: 500; }

        /* ==========================================
           7. 【聯絡方式】獨立頁面
           ========================================== */
        .contact-box {
            background-color: #111; color: white; padding: 60px 30px; border-radius: 16px; margin-top: 30px;
        }
        .contact-btn {
            display: inline-block; background-color: #3498db; color: white; padding: 14px 32px;
            border-radius: 30px; text-decoration: none; font-weight: 600; margin-top: 20px;
        }

        /* 燈箱視窗 */
        .lightbox-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.85); z-index: 9999; flex-direction: column;
            justify-content: center; align-items: center; padding: 30px; box-sizing: border-box; backdrop-filter: blur(5px);
        }
        .lightbox-modal.active { display: flex; }
        .lightbox-content { max-width: 85%; max-height: 75vh; object-fit: contain; border-radius: 6px; }
        .lightbox-caption { color: #fff; margin-top: 20px; font-size: 1.1rem; }
    </style>
</head>
<body>

    <!-- 頂部導覽列 -->
    <header>
        <nav>
            <div class="logo" onclick="navigateTo('home')">詹沅叡 Studio</div>
            <ul class="nav-links">
                <li><a id="link-home" class="active-link" onclick="navigateTo('home')">首頁</a></li>
                <li><a id="link-about" onclick="navigateTo('about')">關於我</a></li>
                <li><a id="link-portfolio" onclick="navigateTo('portfolio')">精選作品</a></li>
                <li><a id="link-contact" onclick="navigateTo('contact')">聯絡方式</a></li>
            </ul>
        </nav>
    </header>

    <!-- 1. 【首頁】 - 包含 mimi.png 大封面 -->
    <div id="page-home" class="page-view active-page">
        <div class="hero-banner">
            <div class="hero-overlay">
                <div class="hero-title">詹沅叡 (小卷)</div>
                <div class="hero-subtitle">平面設計 / 多媒體視覺創作 / 動態視覺</div>
                <a class="hero-btn" onclick="navigateTo('portfolio')">瀏覽精選作品</a>
            </div>
        </div>
    </div>

    <!-- 2. 【關於我】獨立頁面 -->
    <div id="page-about" class="page-view">
        <div class="content-container">
            <div class="page-title">關於我</div>
            <p style="font-size: 1.1rem; color: #555; line-height: 2;">
                嗨！我是小卷。擁有多年平面設計與多媒體影片製作經驗，擅長將品牌靈感轉化為具有質感與商業價值的視覺語言。<br>
                無論是社群圖文、吸睛 Banner、精美包裝還是 POP，我都致力於為每個專案注入獨特的靈魂與美感。
            </p>
        </div>
    </div>

    <!-- 3. 【精選作品】獨立頁面 -->
    <div id="page-portfolio" class="page-view">
        <div class="portfolio-container">
            <div class="page-title">精選作品</div>
            
            <div class="category-tabs">
                <button class="tab-btn active-tab" onclick="switchCategory('fb', this)">FB圖文</button>
                <button class="tab-btn" onclick="switchCategory('line', this)">LINE圖文</button>
                <button class="tab-btn" onclick="switchCategory('banner', this)">BANNER</button>
                <button class="tab-btn" onclick="switchCategory('package', this)">包裝設計</button>
                <button class="tab-btn" onclick="switchCategory('pop', this)">POP</button>
            </div>

            <div class="gallery-wrapper">
                <button class="arrow-btn left-arrow" onclick="prevPage()">&#10094;</button>
                <div class="gallery-grid" id="galleryGrid"></div>
                <button class="arrow-btn right-arrow" onclick="nextPage()">&#10095;</button>
            </div>

            <div class="page-indicator" id="pageIndicator">第 1 頁 / 共 1 頁</div>
        </div>
    </div>

    <!-- 4. 【聯絡方式】獨立頁面 -->
    <div id="page-contact" class="page-view">
        <div class="content-container">
            <div class="contact-box">
                <div class="page-title" style="color: white;">聯絡方式</div>
                <p style="color: #ccc;">有任何合作機會、專案委託或想聊聊設計嗎？歡迎隨時與我聯繫！</p>
                <a href="mailto:your-email@example.com" class="contact-btn">發送電子郵件</a>
            </div>
        </div>
    </div>

    <!-- 燈箱放大視窗 -->
    <div class="lightbox-modal" id="lightboxModal" onclick="closeLightbox()">
        <img class="lightbox-content" id="lightboxImg" src="" alt="放大原圖">
        <div class="lightbox-caption" id="lightboxCaption">專案名稱</div>
    </div>

    <!-- 互動邏輯 Script -->
    <script>
        // 頁面切換機制
        function navigateTo(pageId) {
            // 隱藏所有頁面
            document.querySelectorAll('.page-view').forEach(page => page.classList.remove('active-page'));
            // 移除所有導覽按鈕高亮
            document.querySelectorAll('.nav-links a').forEach(link => link.classList.remove('active-link'));

            // 顯示目標頁面與高亮按鈕
            document.getElementById(`page-${pageId}`).classList.add('active-page');
            const targetLink = document.getElementById(`link-${pageId}`);
            if (targetLink) targetLink.classList.add('active-link');

            // 每次切換頁面置頂
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 作品集資料
        const portfolioData = {
            fb: [
                { src: "images/FB/FB-01.jpg", alt: "FB 社群宣傳圖文 01" },
                { src: "images/FB/FB-02.jpg", alt: "FB 社群宣傳圖文 02" },
                { src: "images/FB/FB-03.jpg", alt: "FB 社群宣傳圖文 03" },
                { src: "images/FB/FB-04.jpg", alt: "FB 社群宣傳圖文 04" },
                { src: "images/FB/FB-05.jpg", alt: "FB 社群宣傳圖文 05" },
                { src: "images/FB/FB-06.jpg", alt: "FB 社群宣傳圖文 06" },
                { src: "images/FB/FB-07.jpg", alt: "FB 社群宣傳圖文 07" }
            ],
            line: [
                { src: "images/LINE/LINE-01.jpg", alt: "LINE 官方帳號圖文 01" },
                { src: "images/LINE/LINE-02.jpg", alt: "LINE 官方帳號圖文 02" },
                { src: "images/LINE/LINE-03.jpg", alt: "LINE 官方帳號圖文 03" },
                { src: "images/LINE/LINE-04.jpg", alt: "LINE 官方帳號圖文 04" },
                { src: "images/LINE/LINE-05.jpg", alt: "LINE 官方帳號圖文 05" },
                { src: "images/LINE/LINE-06.jpg", alt: "LINE 官方帳號圖文 06" },
                { src: "images/LINE/LINE-07.jpg", alt: "LINE 官方帳號圖文 07" },
                { src: "images/LINE/LINE-08.jpg", alt: "LINE 官方帳號圖文 08" },
                { src: "images/LINE/LINE-09.jpg", alt: "LINE 官方帳號圖文 09" },
                { src: "images/LINE/LINE-10.jpg", alt: "LINE 官方帳號圖文 10" },
                { src: "images/LINE/LINE-11.jpg", alt: "LINE 官方帳號圖文 11" },
                { src: "images/LINE/LINE-12.jpg", alt: "LINE 官方帳號圖文 12" },
                { src: "images/LINE/LINE-13.jpg", alt: "LINE 官方帳號圖文 13" },
                { src: "images/LINE/LINE-14.jpg", alt: "LINE 官方帳號圖文 14" },
                { src: "images/LINE/LINE-15.jpg", alt: "LINE 官方帳號圖文 15" }
            ],
            banner: [
                { src: "images/Banner/BANNER-01.jpg", alt: "商業網頁 Banner 設計 01" },
                { src: "images/Banner/BANNER-02.jpg", alt: "商業網頁 Banner 設計 02" },
                { src: "images/Banner/BANNER-03.jpg", alt: "商業網頁 Banner 設計 03" },
                { src: "images/Banner/BANNER-04.jpg", alt: "商業網頁 Banner 設計 04" },
                { src: "images/Banner/BANNER-05.jpg", alt: "商業網頁 Banner 設計 05" },
                { src: "images/Banner/BANNER-06.jpg", alt: "商業網頁 Banner 設計 06" },
                { src: "images/Banner/BANNER-07.jpg", alt: "商業網頁 Banner 設計 07" },
                { src: "images/Banner/BANNER-08.jpg", alt: "商業網頁 Banner 設計 08" },
                { src: "images/Banner/BANNER-09.jpg", alt: "商業網頁 Banner 設計 09" },
                { src: "images/Banner/BANNER-10.jpg", alt: "商業網頁 Banner 設計 10" },
                { src: "images/Banner/BANNER-11.jpg", alt: "商業網頁 Banner 設計 11" },
                { src: "images/Banner/BANNER-12.jpg", alt: "商業網頁 Banner 設計 12" }
            ],
            package: [
                { src: "images/Packaging Design/Packaging Design-02.jpg", alt: "產品包裝設計 02" },
                { src: "images/Packaging Design/Packaging Design-03.jpg", alt: "產品包裝設計 03" },
                { src: "images/Packaging Design/Packaging Design-04.jpg", alt: "產品包裝設計 04" },
                { src: "images/Packaging Design/Packaging Design-05.jpg", alt: "產品包裝設計 05" },
                { src: "images/Packaging Design/Packaging Design-06.jpg", alt: "產品包裝設計 06" }
            ],
            pop: [
                { src: "images/POP/POP-01.jpg", alt: "實體店面 POP 海報設計 01" },
                { src: "images/POP/POP-02.jpg", alt: "實體店面 POP 海報設計 02" },
                { src: "images/POP/POP-03.jpg", alt: "實體店面 POP 海報設計 03" },
                { src: "images/POP/POP-04.jpg", alt: "實體店面 POP 海報設計 04" },
                { src: "images/POP/POP-05.jpg", alt: "實體店面 POP 海報設計 05" },
                { src: "images/POP/POP-06.jpg", alt: "實體店面 POP 海報設計 06" },
                { src: "images/POP/POP-07.jpg", alt: "實體店面 POP 海報設計 07" },
                { src: "images/POP/POP-08.jpg", alt: "實體店面 POP 海報設計 08" },
                { src: "images/POP/POP-09.jpg", alt: "實體店面 POP 海報設計 09" },
                { src: "images/POP/POP-10.jpg", alt: "實體店面 POP 海報設計 10" },
                { src: "images/POP/POP-11.jpg", alt: "實體店面 POP 海報設計 11" },
                { src: "images/POP/POP-12.jpg", alt: "實體店面 POP 海報設計 12" },
                { src: "images/POP/POP-13.jpg", alt: "實體店面 POP 海報設計 13" },
                { src: "images/POP/POP-14.jpg", alt: "實體店面 POP 海報設計 14" }
            ]
        };

        let currentCategory = 'fb';
        let currentPage = 0;
        const itemsPerPage = 6;

        function renderGallery() {
            const grid = document.getElementById('galleryGrid');
            const indicator = document.getElementById('pageIndicator');
            const images = portfolioData[currentCategory];
            
            const totalPages = Math.ceil(images.length / itemsPerPage) || 1;
            if (currentPage >= totalPages) currentPage = totalPages - 1;

            const start = currentPage * itemsPerPage;
            const end = start + itemsPerPage;
            const currentImages = images.slice(start, end);

            grid.innerHTML = '';
            currentImages.forEach(imgData => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'gallery-item';

                const img = document.createElement('img');
                img.src = imgData.src;
                img.alt = imgData.alt;

                itemDiv.onclick = () => openLightbox(imgData.src, imgData.alt);
                itemDiv.appendChild(img);
                grid.appendChild(itemDiv);
            });

            indicator.innerText = `第 ${currentPage + 1} 頁 / 共 ${totalPages} 頁`;
        }

        function openLightbox(imgSrc, captionText) {
            const modal = document.getElementById('lightboxModal');
            const modalImg = document.getElementById('lightboxImg');
            const modalCaption = document.getElementById('lightboxCaption');
            
            modalImg.src = imgSrc;
            modalCaption.innerText = captionText;
            modal.classList.add('active');
        }

        function closeLightbox() {
            document.getElementById('lightboxModal').classList.remove('active');
        }

        function prevPage() {
            const images = portfolioData[currentCategory];
            const totalPages = Math.ceil(images.length / itemsPerPage) || 1;
            currentPage = (currentPage - 1 + totalPages) % totalPages;
            renderGallery();
        }

        function nextPage() {
            const images = portfolioData[currentCategory];
            const totalPages = Math.ceil(images.length / itemsPerPage) || 1;
            currentPage = (currentPage + 1) % totalPages;
            renderGallery();
        }

        function switchCategory(categoryKey, btnElement) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active-tab'));
            btnElement.classList.add('active-tab');
            currentCategory = categoryKey;
            currentPage = 0;
            renderGallery();
        }

        renderGallery();
    </script>
</body>
</html>
