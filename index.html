<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的個人網站 | My One-Page Portfolio</title>
    <style>
        /* 基礎全域設定與平滑滾動 */
        html { scroll-behavior: smooth; }
        body { font-family: 'Helvetica Neue', Arial, "PingFang TC", sans-serif; margin: 0; padding: 0; color: #333; background-color: #f9f9f9; line-height: 1.6; }

        /* 導覽列 */
        header { position: fixed; top: 0; width: 100%; background-color: rgba(255, 255, 255, 0.95); box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 1000; }
        nav { display: flex; justify-content: space-between; align-items: center; max-width: 1100px; margin: 0 auto; padding: 15px 20px; }
        .logo { font-weight: bold; font-size: 1.2rem; color: #2c3e50; }
        .nav-links { list-style: none; display: flex; margin: 0; padding: 0; }
        .nav-links li { margin-left: 20px; }
        .nav-links a { text-decoration: none; color: #555; font-weight: 500; }

        /* 區塊設定 */
        section { padding: 100px 20px 80px 20px; min-height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .container { max-width: 800px; margin: 0 auto; }
        h2 { font-size: 2.5rem; color: #2c3e50; margin-bottom: 20px; }

        /* ==========================================
           【可調整】1. 分類標籤（牌子）設計
           ========================================== */
        .category-tabs {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 30px;
        }
        .tab-btn {
            background-color: #fff;
            border: 2px solid #ddd;
            padding: 8px 18px;            /* 調整按鈕內距（大小） */
            border-radius: 20px;          /* 調整按鈕圓角程度 */
            font-size: 0.95rem;           /* 調整按鈕文字大小 */
            font-weight: bold;
            color: #555;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .tab-btn:hover {
            border-color: #3498db;
            color: #3498db;
        }
        .tab-btn.active-tab {
            background-color: #3498db;
            color: white;
            border-color: #3498db;
            box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3);
        }

        /* ==========================================
           【可調整】2. 橫向圖庫展示區與按鈕外框
           ========================================== */
        .gallery-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            max-width: 1200px;            /* 整個圖庫展示區的最大寬度 */
            width: 100%;
            margin: 0 auto;
        }

        /* 圖片網格容器（一字排開） */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr); /* 預設一列排 6 張圖片 */
            gap: 20px;                     /* 【可調整】圖片與圖片之間的間距 */
            width: 100%;
            padding: 10px;
            transition: opacity 0.4s ease, transform 0.4s ease; /* 切換組別時的淡入淡出動畫時間 */
        }

        /* 單張圖片卡片樣式 */
        .gallery-item {
            background: #fff;
            border-radius: 10px;           /* 【可調整】卡片外框圓角大小 */
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08); /* 【可調整】卡片陰影深淺 */
            transition: transform 0.3s ease;
        }
        .gallery-item:hover {
            transform: translateY(-5px);   /* 滑鼠移上去時卡片浮起的距離 */
        }
        .gallery-item img {
            width: 100%;
            height: 180px;                 /* 【可調整】圖片的高度 */
            object-fit: cover;             /* 確保圖片不變形填滿 */
            display: block;
        }

        /* ==========================================
           【可調整】3. 左右圓形箭頭按鈕設計
           ========================================== */
        .arrow-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;                   /* 【可調整】按鈕圓圈的寬度 */
            height: 50px;                  /* 【可調整】按鈕圓圈的高度 */
            background-color: white;
            border: 1px solid #ddd;
            border-radius: 50%;            /* 保持 50% 才會是正圓形 */
            font-size: 1.2rem;             /* 箭頭符號的大小 */
            color: #333;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 10;
            transition: all 0.3s ease;
        }
        .arrow-btn:hover {
            background-color: #3498db;
            color: white;
            border-color: #3498db;
        }
        .left-arrow {
            left: -25px;                   /* 【可調整】左按鈕距離圖片左側的距離（負值代表往外突出一半） */
        }
        .right-arrow {
            right: -25px;                  /* 【可調整】右按鈕距離圖片右側的距離 */
        }

        /* 頁碼提示文字（例如：第 1 頁 / 共 3 頁） */
        .page-indicator {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #777;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <!-- 導覽列 -->
    <header>
        <nav>
            <div class="logo">詹沅叡 Studio</div>
            <ul class="nav-links">
                <li><a href="#home">首頁</a></li>
                <li><a href="#about">關於我</a></li>
                <li><a href="#portfolio">精選作品</a></li>
                <li><a href="#contact">聯絡方式</a></li>
            </ul>
        </nav>
    </header>

    <!-- 首頁區塊 -->
    <section id="home">
        <h1>哈囉! 我是 詹沅叡(小卷)</h1>
        <p>一名平面設計與影片創作的設計師</p>
    </section>

    <!-- 關於我區塊 -->
    <section id="about">
        <h2>關於我</h2>
        <p>簡短自我介紹。</p>
    </section>

    <!-- 作品集區塊 -->
    <section id="portfolio">
        <h2>精選作品</h2>
        
        <!-- 5個分類牌子按鈕 -->
        <div class="category-tabs">
            <button class="tab-btn active-tab" onclick="switchCategory('fb', this)">FB圖文</button>
            <button class="tab-btn" onclick="switchCategory('line', this)">LINE圖文</button>
            <button class="tab-btn" onclick="switchCategory('banner', this)">BANNER</button>
            <button class="tab-btn" onclick="switchCategory('package', this)">包裝設計</button>
            <button class="tab-btn" onclick="switchCategory('pop', this)">POP</button>
        </div>

        <!-- 橫向圖庫與左右按鈕包裝容器 -->
        <div class="gallery-wrapper">
            <!-- 向左箭頭按鈕 -->
            <button class="arrow-btn left-arrow" onclick="prevPage()">&#10094;</button>
            
            <!-- 圖片一字排開的網格容器 -->
            <div class="gallery-grid" id="galleryGrid">
                <!-- 圖片會由 JavaScript 動態填入 -->
            </div>

            <!-- 向右箭頭按鈕 -->
            <button class="arrow-btn right-arrow" onclick="nextPage()">&#10095;</button>
        </div>

        <!-- 頁碼顯示 -->
        <div class="page-indicator" id="pageIndicator">第 1 頁 / 共 1 頁</div>
    </section>

    <!-- 聯絡方式區塊 -->
    <section id="contact">
        <h2>聯絡方式</h2>
        <p>有任何合作機會或想聊聊的嗎？歡迎隨時與我聯絡！</p>
    </section>

    <!-- ==========================================
       【可調整】4. JavaScript 資料庫與分組切換邏輯
       ========================================== -->
    <script>
        // 💡 這裡可以隨意增加更多圖片！不管放幾張，程式會自動每 6 張為一組分頁
        const portfolioData = {
            fb: [
                { src: "images/FB/FB-01.jpg", alt: "FB作品1" },
                { src: "images/FB/FB-02.jpg", alt: "FB作品2" },
                { src: "images/FB/FB-03.jpg", alt: "FB作品3" },
                { src: "images/FB/FB-01.jpg", alt: "FB作品4" },
                { src: "images/FB/FB-02.jpg", alt: "FB作品5" },
                { src: "images/FB/FB-03.jpg", alt: "FB作品6" },
                { src: "images/FB/FB-01.jpg", alt: "FB作品7" }, // 示範超過 6 張會自動分到第二頁
                { src: "images/FB/FB-02.jpg", alt: "FB作品8" }
            ],
            line: [
                { src: "images/FB/FB-01.jpg", alt: "LINE作品1" },
                { src: "images/FB/FB-02.jpg", alt: "LINE作品2" }
            ],
            banner: [
                { src: "images/FB/FB-03.jpg", alt: "Banner作品1" }
            ],
            package: [
                { src: "images/FB/FB-01.jpg", alt: "包裝設計1" }
            ],
            pop: [
                { src: "images/FB/FB-02.jpg", alt: "POP作品1" }
            ]
        };

        let currentCategory = 'fb';
        let currentPage = 0;
        const itemsPerPage = 6; // 【可調整】每一組要顯示幾張圖片（目前設定為 6 張一組）

        // 載入當前分類的圖片
        function renderGallery() {
            const grid = document.getElementById('galleryGrid');
            const indicator = document.getElementById('pageIndicator');
            const images = portfolioData[currentCategory];
            
            // 計算總共有幾頁
            const totalPages = Math.ceil(images.length / itemsPerPage) || 1;
            
            // 確保當前頁碼不超出範圍
            if (currentPage >= totalPages) {
                currentPage = totalPages - 1;
            }

            // 取出目前這一頁要顯示的 6 張圖片
            const start = currentPage * itemsPerPage;
            const end = start + itemsPerPage;
            const currentImages = images.slice(start, end);

            // 清空並重新組裝 HTML
            grid.innerHTML = '';
            currentImages.forEach(imgData => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'gallery-item';

                const img = document.createElement('img');
                img.src = imgData.src;
                img.alt = imgData.alt;

                itemDiv.appendChild(img);
                grid.appendChild(itemDiv);
            });

            // 更新頁碼文字提示
            indicator.innerText = `第 ${currentPage + 1} 頁 / 共 ${totalPages} 頁`;
        }

        // 點擊向左箭頭按鈕
        function prevPage() {
            const images = portfolioData[currentCategory];
            const totalPages = Math.ceil(images.length / itemsPerPage) || 1;
            
            // 順向循環：如果在第一頁，按向左會直接循環跳到最後一頁
            currentPage = (currentPage - 1 + totalPages) % totalPages;
            renderGallery();
        }

        // 點擊向右箭頭按鈕
        function nextPage() {
            const images = portfolioData[currentCategory];
            const totalPages = Math.ceil(images.length / itemsPerPage) || 1;
            
            // 順向循環：如果在最後一頁，按向右會順向回到第一頁
            currentPage = (currentPage + 1) % totalPages;
            renderGallery();
        }

        // 點擊上方分類牌子時觸發
        function switchCategory(categoryKey, btnElement) {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active-tab');
            });
            btnElement.classList.add('active-tab');

            currentCategory = categoryKey;
            currentPage = 0; // 換分類時歸零到第一頁
            renderGallery();
        }

        // 網頁一打開預設載入 FB
        renderGallery();
    </script>
</body>
</html>
