<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的個人網站 | My One-Page Portfolio</title>
    <style>
        /* 基礎全域設定與平滑滾動 */
        html { scroll-behavior: smooth; }
        body { font-family: 'Helvetica Neue', Arial, "PingFang TC", sans-serif; margin: 0; padding: 0; color: #333; background-color: #f9f9f9; line-height: 1.6; }

        /* 導覽列 */
        header { position: fixed; top: 0; width: 100%; background-color: rgba(255, 255, 255, 0.95); box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 1000; }
        nav { display: flex; justify-content: space-between; align-items: center; max-width: 1100px; margin: 0 auto; padding: 15px 20px; }
        .logo { font-weight: bold; font-size: 1.2rem; color: #2c3e50; }
        .nav-links { list-style: none; display: flex; margin: 0; padding: 0; }
        .nav-links li { margin-left: 20px; }
        .nav-links a { text-decoration: none; color: #555; font-weight: 500; }

        /* 區塊設定 */
        section { padding: 100px 20px 80px 20px; min-height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .container { max-width: 800px; margin: 0 auto; }
        h2 { font-size: 2.5rem; color: #2c3e50; margin-bottom: 20px; }

        /* ==========================================
           【1. 分類標籤（牌子）設計】
           ========================================== */
        .category-tabs {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 30px;
        }
        .tab-btn {
            background-color: #fff;
            border: 2px solid #ddd;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 0.95rem;
            font-weight: bold;
            color: #555;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .tab-btn:hover {
            border-color: #3498db;
            color: #3498db;
        }
        .tab-btn.active-tab {
            background-color: #3498db;
            color: white;
            border-color: #3498db;
            box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3);
        }

        /* ==========================================
           【2. 3D 舞台與左輪容器設定】
           ========================================== */
        .carousel-stage { 
            perspective: 1200px; 
            height: 450px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            width: 100%;
            overflow: hidden; 
        }

        .carousel-container { 
            width: 260px; 
            height: 340px; 
            position: relative; 
            transform-style: preserve-3d; 
            /* 讓旋轉動畫更加滑順自然 */
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1); 
        }

        .carousel-item { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.5s;
            cursor: pointer; 
            opacity: 0.4; 
        }

        .carousel-item img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.25); 
        }

        .carousel-item.active { 
            opacity: 1; 
            z-index: 10; 
        }
    </style>
</head>
<body>

    <!-- 導覽列 -->
    <header>
        <nav>
            <div class="logo">詹沅叡 Studio</div>
            <ul class="nav-links">
                <li><a href="#home">首頁</a></li>
                <li><a href="#about">關於我</a></li>
                <li><a href="#portfolio">精選作品</a></li>
                <li><a href="#contact">聯絡方式</a></li>
            </ul>
        </nav>
    </header>

    <!-- 首頁區塊 -->
    <section id="home">
        <h1>哈囉！我是 詹沅叡(小卷)</h1>
        <p>一名平面設計與影片創作的設計師</p>
    </section>

    <!-- 關於我區塊 -->
    <section id="about">
        <h2>關於我</h2>
        <p>簡短自我介紹。</p>
    </section>

    <!-- 作品集區塊 -->
    <section id="portfolio">
        <h2>精選作品</h2>
        
        <!-- 5個分類牌子按鈕 -->
        <div class="category-tabs">
            <button class="tab-btn active-tab" onclick="switchCategory('fb', this)">FB圖文</button>
            <button class="tab-btn" onclick="switchCategory('line', this)">LINE圖文</button>
            <button class="tab-btn" onclick="switchCategory('banner', this)">BANNER</button>
            <button class="tab-btn" onclick="switchCategory('package', this)">包裝設計</button>
            <button class="tab-btn" onclick="switchCategory('pop', this)">POP</button>
        </div>

        <!-- 3D 旋轉舞台 -->
        <div class="carousel-stage">
            <div class="carousel-container" id="carousel">
                <!-- 圖片會自動載入 -->
            </div>
        </div>
    </section>

    <!-- 聯絡方式區塊 -->
    <section id="contact">
        <h2>聯絡方式</h2>
        <p>有任何合作機會或想聊聊的嗎？歡迎隨時與我聯絡！</p>
    </section>

    <!-- ==========================================
       【3. 邏輯與累積旋轉角度升級】
       ========================================== -->
    <script>
        // 💡 這裡可以隨意增加更多圖片！只要照著格式貼上下一張即可
        const portfolioData = {
            fb: [
                { src: "images/FB/FB-01.jpg", alt: "FB作品1" },
                { src: "images/FB/FB-02.jpg", alt: "FB作品2" },
                { src: "images/FB/FB-03.jpg", alt: "FB作品3" },
                { src: "images/FB/FB-01.jpg", alt: "FB作品4" }, // 示範增加第4張
                { src: "images/FB/FB-02.jpg", alt: "FB作品5" }  // 示範增加第5張
            ],
            line: [
                { src: "images/FB/FB-01.jpg", alt: "LINE作品1" },
                { src: "images/FB/FB-02.jpg", alt: "LINE作品2" },
                { src: "images/FB/FB-03.jpg", alt: "LINE作品3" }
            ],
            banner: [
                { src: "images/FB/FB-03.jpg", alt: "Banner作品1" },
                { src: "images/FB/FB-01.jpg", alt: "Banner作品2" }
            ],
            package: [
                { src: "images/FB/FB-01.jpg", alt: "包裝設計1" },
                { src: "images/FB/FB-02.jpg", alt: "包裝設計2" }
            ],
            pop: [
                { src: "images/FB/FB-02.jpg", alt: "POP作品1" },
                { src: "images/FB/FB-03.jpg", alt: "POP作品2" }
            ]
        };

        const carousel = document.getElementById('carousel');
        let currentCategory = 'fb';
        let currentIndex = 0;
        let accumulatedRotation = 0; // 用來累積旋轉角度，確保永遠朝同一個方向順向轉動
        const radius = 380;          // 圓形半徑（如果圖片變多，半徑可以稍微調大一點讓間距更好看）

        function loadCategory(categoryKey) {
            currentCategory = categoryKey;
            currentIndex = 0;
            accumulatedRotation = 0; // 切換分類時歸零角度
            
            const images = portfolioData[categoryKey];
            carousel.innerHTML = ''; 

            images.forEach((imgData, index) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'carousel-item';
                if (index === 0) itemDiv.classList.add('active');

                const img = document.createElement('img');
                img.src = imgData.src;
                img.alt = imgData.alt;

                itemDiv.appendChild(img);

                // 點擊事件：改用計算差值來確保永遠順向旋轉
                itemDiv.onclick = () => {
                    const totalItems = images.length;
                    
                    // 計算點擊的目標與當前位置的距離差
                    let diff = index - currentIndex;
                    
                    // 核心技巧：透過數學邏輯修正，讓跨越頭尾（最後一張到第一張）時保持單向旋轉
                    if (diff > totalItems / 2) {
                        diff -= totalItems;
                    } else if (diff < -totalItems / 2) {
                        diff += totalItems;
                    }

                    currentIndex = index;
                    const angleStep = 360 / totalItems;
                    accumulatedRotation -= diff * angleStep; // 累積角度，達成流暢單向旋轉

                    updateCarousel();
                };

                carousel.appendChild(itemDiv);
            });

            updateCarousel();
        }

        function updateCarousel() {
            const items = carousel.querySelectorAll('.carousel-item');
            if (items.length === 0) return;

            const angleStep = 360 / items.length;
            
            // 套用累積角度，實現永遠順向轉動
            carousel.style.transform = `rotateY(${accumulatedRotation}deg)`;

            items.forEach((item, index) => {
                const angle = angleStep * index;
                
                if (index === currentIndex) {
                    item.style.transform = `rotateY(${angle}deg) translateZ(${radius}px) scale(1.25)`;
                    item.classList.add('active');
                } else {
                    item.style.transform = `rotateY(${angle}deg) translateZ(${radius}px) scale(0.9)`;
                    item.classList.remove('active');
                }
            });
        }

        function switchCategory(categoryKey, btnElement) {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active-tab');
            });
            btnElement.classList.add('active-tab');
            loadCategory(categoryKey);
        }

        // 初始預設載入
        loadCategory('fb');
    </script>
</body>
</html>
