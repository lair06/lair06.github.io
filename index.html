<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>

    <style>
        /* ==========================================
           1. 全域基礎設定
           ========================================== */
        body { 
            font-family: 'Montserrat', 'Helvetica Neue', Arial, "PingFang TC", sans-serif; 
            margin: 0; padding: 0; 
            color: #333; 
            background-color: #ffffff; 
            line-height: 1.6; 
        }

        /* ==========================================
           2. 頁面控制與無導覽列置頂設定
           ========================================== */
        .page-view {
            display: none; 
            padding-top: 0; 
            min-height: 100vh;
            box-sizing: border-box;
        }
        .page-view.active-page {
            display: block; 
        }

        /* ==========================================
           3. 【首頁】mimi2.jpg 滿版封面設定
           ========================================== */
        .hero-banner {
            position: relative;
            width: 100%;
            height: 100vh;
            background-image: url('images/mimi/mimi2.jpg?v=2'); 
            background-size: cover; 
            background-position: center;  
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
        }

        /* 文字與按鈕區域：靠左排列 */
        .hero-overlay {
            background-color: transparent; 
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start; /* 靠左邊線對齊 */
            padding-left: 10%;       /* 距離左邊邊界 10% 的留白 */
            padding-right: 20px;
            box-sizing: border-box;
            text-align: left;        /* 文字靠左 */
        }
        .hero-title {
            font-size: 3.5rem;
            color: #111111; 
            font-weight: 700;
            margin-bottom: 15px;
            text-shadow: 0 2px 10px rgba(255,255,255,0.9);
        }
        .hero-subtitle {
            font-size: 1.3rem;
            color: #333333;
            margin-bottom: 30px;
            text-shadow: 0 1px 8px rgba(255,255,255,0.9);
            font-weight: 600;
        }

        /* 多按鈕組合容器 */
        .hero-btn-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        .hero-btn {
            display: inline-block;
            background-color: #3498db;
            color: white;
            padding: 12px 28px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
            border: 2px solid #3498db;
            text-align: center;
        }
        .hero-btn:hover {
            background-color: #2980b9;
            border-color: #2980b9;
            transform: translateY(-2px);
        }
        /* 次要按鈕樣式 */
        .hero-btn.btn-secondary {
            background-color: rgba(255, 255, 255, 0.9);
            color: #111111;
            border: 2px solid #111111;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }
        .hero-btn.btn-secondary:hover {
            background-color: #111111;
            color: #ffffff;
            transform: translateY(-2px);
        }

        /* ==========================================
           4. 【關於我】頁面
           ========================================== */
        #page-about { background-color: #f7f8fa; }
        .content-container {
            max-width: 800px;
            margin: 60px auto;
            padding: 40px 20px;
            text-align: center;
        }
        .page-title {
            font-size: 2.5rem;
            color: #111;
            font-weight: 700;
            margin-bottom: 20px;
        }

        /* ==========================================
           5. 【作品】頁面 (7 大色塊區版本)
           ========================================== */
        #page-portfolio { background-color: #ffffff; }
        .portfolio-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 40px 20px;
            text-align: center;
        }
        
        .portfolio-title-wrapper {
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .portfolio-main-title {
            font-size: 2.5rem;
            color: #111;
            font-weight: 700;
            margin: 0;
        }
        .portfolio-sub-title {
            font-size: 1.1rem;
            color: #888;
            font-weight: 400;
            margin-top: 10px;
        }

        /* 大色塊選單容器 */
        .color-tiles-container {
            display: flex;
            width: 100%;
            height: 380px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            margin-bottom: 30px;
        }

        .color-tile {
            flex: 1;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 35px;
            cursor: pointer;
            transition: flex 0.4s cubic-bezier(0.25, 1, 0.5, 1), filter 0.3s ease;
            user-select: none;
        }

        .color-tile:hover {
            flex: 1.25; /* 觸控/滑鼠移上去時展開 */
            filter: brightness(1.05);
        }

        .tile-text {
            font-size: 1.8rem;
            font-weight: 700;
            color: #111111;
            letter-spacing: 2px;
        }

        /* 色塊配色設定 */
        .tile-fb      { background-color: #48c9b0; }
        .tile-line    { background-color: #3498db; }
        .tile-banner  { background-color: #d7bde2; }
        .tile-package { background-color: #f8965d; }
        .tile-pop     { background-color: #c0392b; }
        .tile-pop .tile-text { color: #ffffff; }
        .tile-cis     { background-color: #2c3e50; }
        .tile-cis .tile-text { color: #ffffff; }
        .tile-motion  { background-color: #8e44ad; }
        .tile-motion .tile-text { color: #ffffff; }

        /* 橫向滾動畫廊容器 */
        .horizontal-gallery-wrapper {
            display: none; /* 點擊色塊後才展開 */
            position: relative;
            width: 100%;
            margin-top: 20px;
            text-align: left;
        }

        .horizontal-gallery-wrapper.active {
            display: block;
        }

        /* 橫向滾動畫廊列 */
        .horizontal-scroll-grid {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            scroll-behavior: smooth;
            padding: 15px 5px 25px 5px;
            scrollbar-width: thin;
            scrollbar-color: #3498db #f1f1f1;
        }

        .horizontal-scroll-grid::-webkit-scrollbar {
            height: 8px;
        }
        .horizontal-scroll-grid::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        .horizontal-scroll-grid::-webkit-scrollbar-thumb {
            background: #3498db;
            border-radius: 10px;
        }

        /* 橫向畫廊單張卡片 */
        .horizontal-item {
            flex: 0 0 auto;
            width: 320px;
            height: 220px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            cursor: pointer;
            position: relative;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .horizontal-item:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.15);
        }

        .horizontal-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .horizontal-item::after {
            content: "點擊放大";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            color: white;
            font-weight: 600;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .horizontal-item.is-video::after {
            content: "▶ 播放影片";
        }
        .horizontal-item:hover::after {
            opacity: 1;
        }

        .current-category-label {
            display: inline-block;
            font-size: 1.2rem;
            font-weight: 700;
            color: #111;
            margin-bottom: 10px;
        }

        /* ==========================================
           6. 【聯絡方式】頁面
           ========================================== */
        #page-contact { background-color: #f7f8fa; }
        .contact-box {
            background-color: #111; color: white; padding: 60px 30px; border-radius: 16px; margin-top: 30px;
        }
        .contact-btn {
            display: inline-block; background-color: #3498db; color: white; padding: 14px 32px;
            border-radius: 30px; text-decoration: none; font-weight: 600; margin-top: 20px;
        }

        /* 燈箱視窗 (支援圖片與影片) */
        .lightbox-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.85); z-index: 9999; flex-direction: column;
            justify-content: center; align-items: center; padding: 30px; box-sizing: border-box; backdrop-filter: blur(5px);
        }
        .lightbox-modal.active { display: flex; }
        .lightbox-content { max-width: 85%; max-height: 75vh; object-fit: contain; border-radius: 6px; }
        .lightbox-iframe { width: 80%; max-width: 900px; height: 506px; max-height: 70vh; border-radius: 12px; border: none; }
        .lightbox-caption { color: #fff; margin-top: 20px; font-size: 1.1rem; }

        /* ==========================================
           7. 📱 手機版響應式專用優化 (Mobile RWD)
           ========================================== */
        @media (max-width: 768px) {
            .hero-banner {
                background-position: 80% center; /* 手機版將主視覺貓咪向右微調，避免遮擋文字 */
            }

            .hero-overlay {
                padding-left: 8%;
                padding-right: 8%;
                background: linear-gradient(to right, rgba(255,255,255,0.85) 0%, rgba(255,255,255,0.4) 75%, transparent 100%);
            }
            
            .hero-title {
                font-size: 2.2rem;
                margin-bottom: 10px;
            }
            
            .hero-subtitle {
                font-size: 1rem;
                margin-bottom: 25px;
                line-height: 1.5;
            }

            .hero-btn-group {
                flex-direction: column;
                width: 100%;
                max-width: 240px;
                gap: 12px;
            }

            .hero-btn {
                width: 100%;
                padding: 10px 0;
                box-sizing: border-box;
                font-size: 0.95rem;
            }

            .color-tiles-container {
                height: 280px;
            }

            .tile-text {
                font-size: 1rem;
                writing-mode: vertical-lr; /* 手機版色塊文字改直排，提升排版質感 */
                letter-spacing: 4px;
                padding-bottom: 15px;
            }

            .horizontal-item {
                width: 260px;
                height: 180px;
            }

            .lightbox-iframe {
                width: 95%;
                height: 250px;
            }
        }
    </style>

        // 點擊色塊時，展開橫向滾動畫廊
        function openCategoryGallery(categoryKey, titleText) {
            const wrapper = document.getElementById('horizontalGalleryWrapper');
            const grid = document.getElementById('horizontalScrollGrid');
            const label = document.getElementById('categoryLabel');
            const items = portfolioData[categoryKey];

            label.innerText = `▸ ${titleText} 作品列表`;
            grid.innerHTML = '';

            items.forEach(itemData => {
                const itemDiv = document.createElement('div');
                const isVideo = categoryKey === 'motion';
                itemDiv.className = `horizontal-item ${isVideo ? 'is-video' : ''}`;

                const img = document.createElement('img');
                
                if (isVideo) {
                    img.src = `https://img.youtube.com/vi/${itemData.videoId}/hqdefault.jpg`;
                    img.alt = itemData.alt;
                    itemDiv.onclick = () => openVideoLightbox(itemData.videoId, itemData.alt);
                } else {
                    img.src = encodeURI(itemData.src);
                    img.alt = itemData.alt;
                    itemDiv.onclick = () => openImageLightbox(encodeURI(itemData.src), itemData.alt);
                }

                itemDiv.appendChild(img);
                grid.appendChild(itemDiv);
            });

            // 展開畫廊
            wrapper.classList.add('active');

            // 平滑滾動至畫廊區域
            wrapper.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        // 監聽畫廊區塊的滑鼠滾輪事件，讓垂直滾輪直接變「左右橫滑」
        const scrollGrid = document.getElementById('horizontalScrollGrid');
        scrollGrid.addEventListener('wheel', (evt) => {
            evt.preventDefault();
            scrollGrid.scrollLeft += evt.deltaY;
        }, { passive: false });

        // 燈箱控制邏輯：開啟圖片
        function openImageLightbox(imgSrc, captionText) {
            const modal = document.getElementById('lightboxModal');
            const modalImg = document.getElementById('lightboxImg');
            const modalIframe = document.getElementById('lightboxIframe');
            const modalCaption = document.getElementById('lightboxCaption');
            
            modalIframe.style.display = 'none';
            modalIframe.src = '';

            modalImg.src = imgSrc;
            modalImg.style.display = 'block';
            modalCaption.innerText = captionText;
            modal.classList.add('active');
        }

        // 燈箱控制邏輯：開啟 YouTube 影片
        function openVideoLightbox(videoId, captionText) {
            const modal = document.getElementById('lightboxModal');
            const modalImg = document.getElementById('lightboxImg');
            const modalIframe = document.getElementById('lightboxIframe');
            const modalCaption = document.getElementById('lightboxCaption');
            
            modalImg.style.display = 'none';
            modalImg.src = '';

            modalIframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
            modalIframe.style.display = 'block';
            modalCaption.innerText = captionText;
            modal.classList.add('active');
        }

        // 關閉燈箱
        function closeLightbox() {
            const modal = document.getElementById('lightboxModal');
            const modalIframe = document.getElementById('lightboxIframe');
            
            modalIframe.src = ''; // 關閉時停止影片播放
            modal.classList.remove('active');
        }
    </script>
